<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- EVA-style T-tetromino -->
  <rect width="32" height="32" fill="#0a0a0a"/>

  <!-- top-left block -->
  <rect x="2" y="3" width="9" height="9" fill="#B83C00"/>
  <rect x="2" y="3" width="9" height="1" fill="#FF9966"/>
  <rect x="2" y="3" width="1" height="9" fill="#FF9966"/>
  <rect x="3" y="4" width="7" height="7" fill="#FF5500"/>
  <rect x="8" y="9" width="2" height="2" fill="#CC4400"/>

  <!-- top-center block -->
  <rect x="12" y="3" width="9" height="9" fill="#B83C00"/>
  <rect x="12" y="3" width="9" height="1" fill="#FF9966"/>
  <rect x="12" y="3" width="1" height="9" fill="#FF9966"/>
  <rect x="13" y="4" width="7" height="7" fill="#FF5500"/>
  <rect x="18" y="9" width="2" height="2" fill="#CC4400"/>

  <!-- top-right block -->
  <rect x="22" y="3" width="9" height="9" fill="#B83C00"/>
  <rect x="22" y="3" width="9" height="1" fill="#FF9966"/>
  <rect x="22" y="3" width="1" height="9" fill="#FF9966"/>
  <rect x="23" y="4" width="7" height="7" fill="#FF5500"/>
  <rect x="28" y="9" width="2" height="2" fill="#CC4400"/>

  <!-- stem block -->
  <rect x="12" y="13" width="9" height="9" fill="#B83C00"/>
  <rect x="12" y="13" width="9" height="1" fill="#FF9966"/>
  <rect x="12" y="13" width="1" height="9" fill="#FF9966"/>
  <rect x="13" y="14" width="7" height="7" fill="#FF5500"/>
  <rect x="18" y="19" width="2" height="2" fill="#CC4400"/>
</svg>
